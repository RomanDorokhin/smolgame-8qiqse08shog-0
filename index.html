<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>SMOL RUN</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0f;
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100vh;
    overflow: hidden;
    font-family: 'Courier New', monospace;
    touch-action: none;
    user-select: none;
  }
  canvas {
    display: block;
    max-width: 100vw;
    max-height: 100vh;
  }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

let W, H, GR;

const PALETTES = [
  { bg: '#0a0a0f', ground: '#1a1a2e', groundLine: '#7B2FBE', player: '#a855f7', playerGlow: '#c084fc', obstacle: '#f43f5e', obstacleGlow: '#fb7185', score: '#e2e8f0', accent: '#7c3aed', trail: '#7c3aed' },
  { bg: '#0c1220', ground: '#152238', groundLine: '#38bdf8', player: '#818cf8', playerGlow: '#a5b4fc', obstacle: '#f97316', obstacleGlow: '#fdba74', score: '#e0f2fe', accent: '#6366f1', trail: '#818cf8' },
  { bg: '#0f0a14', ground: '#231528', groundLine: '#ec4899', player: '#34d399', playerGlow: '#6ee7b7', obstacle: '#f472b6', obstacleGlow: '#fbcfe8', score: '#fce7f3', accent: '#10b981', trail: '#34d399' },
  { bg: '#0a1210', ground: '#13221e', groundLine: '#22d3ee', player: '#fbbf24', playerGlow: '#fde68a', obstacle: '#ef4444', obstacleGlow: '#fca5a5', score: '#ecfccb', accent: '#eab308', trail: '#fbbf24' },
];

let COLORS = { ...PALETTES[0] };

function applyPaletteByScore(score) {
  const i = Math.min(PALETTES.length - 1, Math.floor(score / 420)) % PALETTES.length;
  Object.assign(COLORS, PALETTES[i]);
}

function todayKey() {
  return new Date().toISOString().slice(0, 10);
}

function weekKey() {
  const d = new Date();
  const t = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
  const day = t.getUTCDay() || 7;
  t.setUTCDate(t.getUTCDate() + 4 - day);
  const y = t.getUTCFullYear();
  const w1 = new Date(Date.UTC(y, 0, 1));
  const w = Math.ceil((((t - w1) / 86400000) + 1) / 7);
  return y + '-W' + String(w).padStart(2, '0');
}

let stars = [];

function regenStars() {
  stars = Array.from({ length: 60 }, () => ({
    x: Math.random() * W,
    y: Math.random() * GR * 0.9,
    r: Math.random() * 1.5 + 0.3,
    blink: Math.random() * Math.PI * 2,
  }));
}

function syncSize() {
  W = canvas.width = Math.min(window.innerWidth, 420);
  H = canvas.height = window.innerHeight;
  GR = H * 0.72;
  player.x = W * 0.2;
  if (player.y >= GR) player.y = GR;
  regenStars();
}

syncSize();
window.addEventListener('resize', syncSize);

const groundY = () => GR + player.h;

let dino = {
  active: false,
  x: -80,
  y: 0,
  vy: 0,
  w: 46,
  h: 34,
  jumpCd: 0,
};

function rr(ctx, x, y, w, h, r) {
  r = Math.min(r, w / 2, h / 2);
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.arcTo(x + w, y, x + w, y + r, r);
  ctx.lineTo(x + w, y + h - r);
  ctx.arcTo(x + w, y + h, x + w - r, y + h, r);
  ctx.lineTo(x + r, y + h);
  ctx.arcTo(x, y + h, x, y + h - r, r);
  ctx.lineTo(x, y + r);
  ctx.arcTo(x, y, x + r, y, r);
  ctx.closePath();
}

const DAILY_GOAL = 500;

const state = {
  phase: 'start',
  score: 0,
  best: parseInt(localStorage.getItem('smol_best') || '0', 10),
  speed: 5,
  frame: 0,
  flash: 0,
  nextDinoAt: 0,
  hitstop: 0,
  soundOn: false,
  goalToast: 0,
  recordedDeath: false,
};

const player = {
  x: W * 0.2,
  y: GR,
  w: 28,
  h: 40,
  vy: 0,
  jumps: 0,
  maxJumps: 2,
  dead: false,
  trail: [],
};

let obstacles = [];
let particles = [];

let audioCtx;
function playTone(freq, dur, vol) {
  if (!state.soundOn) return;
  try {
    const AC = window.AudioContext || window.webkitAudioContext;
    if (!AC) return;
    audioCtx = audioCtx || new AC();
    if (audioCtx.state === 'suspended') audioCtx.resume();
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    o.type = 'square';
    o.frequency.value = freq;
    g.gain.value = vol;
    o.connect(g);
    g.connect(audioCtx.destination);
    o.start();
    o.stop(audioCtx.currentTime + dur);
  } catch (e) {}
}

const GRAVITY = 0.65;
const JUMP_FORCE = -14;

const OB = {
  low: { w: 38, h: 28 },
  tall: { w: 18, h: 65 },
  wide: { w: 50, h: 22 },
  mid: { w: 22, h: 45 },
};

function pushObstacle(t, xExtra) {
  obstacles.push({
    x: W + 20 + (xExtra || 0),
    y: GR - t.h + player.h,
    w: t.w,
    h: t.h,
    pulse: Math.random() * Math.PI * 2,
  });
}

function spawnObstacleWave() {
  const u = Math.random();
  if (u < 0.34) {
    const pool = [OB.low, OB.tall, OB.wide, OB.mid];
    pushObstacle(pool[Math.floor(Math.random() * pool.length)]);
  } else if (u < 0.54) {
    pushObstacle(OB.low, 0);
    pushObstacle(OB.tall, 78);
  } else if (u < 0.72) {
    pushObstacle(OB.low, 0);
    pushObstacle(OB.low, 64);
  } else if (u < 0.86) {
    pushObstacle(OB.tall);
  } else {
    pushObstacle(OB.wide, 0);
    pushObstacle(OB.mid, 108);
  }
}

function toggleSoundTap(clientX, clientY) {
  if (clientX > W - 56 && clientY < 48) {
    state.soundOn = !state.soundOn;
    if (state.soundOn) playTone(440, 0.06, 0.04);
    return true;
  }
  return false;
}

function jump() {
  if (state.phase === 'start') {
    state.phase = 'play';
    resetGame();
    return;
  }
  if (state.phase === 'dead') {
    state.phase = 'play';
    resetGame();
    return;
  }
  if (player.jumps < player.maxJumps) {
    player.vy = JUMP_FORCE * (player.jumps === 1 ? 0.8 : 1);
    player.jumps++;
    spawnJumpParticles();
    playTone(520, 0.04, 0.06);
  }
}

function resetGame() {
  player.y = GR;
  player.vy = 0;
  player.jumps = 0;
  player.dead = false;
  player.trail = [];
  obstacles = [];
  particles = [];
  state.score = 0;
  state.speed = 5;
  state.frame = 0;
  state.flash = 0;
  state.hitstop = 0;
  state.recordedDeath = false;
  state.goalToast = 0;
  dino.active = false;
  dino.x = -80;
  dino.vy = 0;
  dino.jumpCd = 0;
  state.nextDinoAt = 38 + Math.floor(Math.random() * 42);
  applyPaletteByScore(0);
}

function spawnDino() {
  dino.active = true;
  dino.x = player.x - 95 - Math.floor(Math.random() * 35);
  dino.vy = 0;
  dino.y = groundY() - dino.h;
  dino.jumpCd = 10;
}

function drawChromeDino() {
  if (!dino.active) return;
  const gx = dino.x;
  const gy = dino.y;
  const leg = Math.floor(state.frame / 4) % 2;
  ctx.save();
  ctx.fillStyle = '#535353';
  const s = 1.15;
  ctx.translate(gx, gy);
  ctx.scale(s, s);
  const px = (x, y, w, h) => ctx.fillRect(x, y, w, h);
  px(32, 4, 14, 8);
  px(28, 10, 22, 12);
  px(8, 14, 24, 10);
  px(0, 18, 12, 8);
  px(10, 22, 10, 6);
  px(22, 24, 8, 6);
  if (leg === 0) {
    px(24, 28, 5, 6);
    px(32, 28, 5, 6);
  } else {
    px(26, 28, 5, 6);
    px(34, 26, 5, 8);
  }
  ctx.fillStyle = '#3f3f3f';
  px(40, 6, 3, 3);
  ctx.restore();
}

function updateDino() {
  if (!dino.active || state.phase !== 'play' || player.dead) return;
  if (state.hitstop > 0) return;
  const floor = groundY() - dino.h;
  if (dino.jumpCd > 0) dino.jumpCd--;

  dino.x += state.speed + 1.15 + state.speed * 0.06;

  let wantJump = false;
  if (dino.y >= floor - 0.5 && dino.jumpCd === 0) {
    for (let i = 0; i < obstacles.length; i++) {
      const ob = obstacles[i];
      const ahead = ob.x - (dino.x + dino.w);
      if (ahead > 8 && ahead < 72 && ob.h > 18) {
        wantJump = true;
        break;
      }
    }
    if (!wantJump && state.frame % 72 === 11) wantJump = true;
  }
  if (wantJump && dino.y >= floor - 0.5 && dino.jumpCd === 0) {
    dino.vy = -12.5;
    dino.jumpCd = 42;
  }

  dino.vy += GRAVITY;
  dino.y += dino.vy;
  if (dino.y >= floor) {
    dino.y = floor;
    dino.vy = 0;
  }

  if (dino.x > W + 60) {
    dino.active = false;
    state.nextDinoAt = state.frame + 55 + Math.floor(Math.random() * 75);
  }
}

function spawnJumpParticles() {
  for (let i = 0; i < 8; i++) {
    particles.push({
      x: player.x + player.w / 2,
      y: player.y + player.h,
      vx: (Math.random() - 0.5) * 4,
      vy: Math.random() * -3,
      life: 1,
      decay: 0.06 + Math.random() * 0.04,
      r: 2 + Math.random() * 3,
    });
  }
}

function spawnDeathParticles() {
  for (let i = 0; i < 12; i++) {
    const angle = (Math.PI * 2 * i) / 12 + Math.random() * 0.25;
    const spd = 2 + Math.random() * 4;
    particles.push({
      x: player.x + player.w / 2,
      y: player.y + player.h / 2,
      vx: Math.cos(angle) * spd,
      vy: Math.sin(angle) * spd,
      life: 1,
      decay: 0.03 + Math.random() * 0.02,
      r: 2 + Math.random() * 3,
      death: true,
    });
  }
}

function checkCollision(a, b) {
  const pad = 5;
  return (
    a.x + pad < b.x + b.w &&
    a.x + a.w - pad > b.x &&
    a.y + pad < b.y + b.h &&
    a.y + a.h - pad > b.y
  );
}

function drawPlayer() {
  player.trail.forEach((t, i) => {
    const alpha = (i / player.trail.length) * 0.3;
    ctx.fillStyle = `rgba(124,58,237,${alpha})`;
    ctx.fillRect(t.x, t.y, player.w * (i / player.trail.length), player.h * (i / player.trail.length));
  });

  ctx.shadowBlur = 20;
  ctx.shadowColor = COLORS.playerGlow;
  ctx.fillStyle = COLORS.player;
  rr(ctx, player.x, player.y, player.w, player.h, 6);
  ctx.fill();

  ctx.shadowBlur = 0;
  ctx.fillStyle = '#fff';
  const eyeY = player.y + 10;
  const squish = player.vy < -2 ? 0.7 : player.vy > 3 ? 1.3 : 1;
  ctx.beginPath();
  ctx.ellipse(player.x + 8, eyeY, 4, 4 * squish, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.ellipse(player.x + 18, eyeY, 4, 4 * squish, 0, 0, Math.PI * 2);
  ctx.fill();

  ctx.fillStyle = '#0a0a0f';
  ctx.beginPath();
  ctx.ellipse(player.x + 9, eyeY, 2, 2 * squish, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.ellipse(player.x + 19, eyeY, 2, 2 * squish, 0, 0, Math.PI * 2);
  ctx.fill();

  const legAnim = Math.sin(state.frame * 0.25) * 6;
  if (player.jumps === 0) {
    ctx.fillStyle = '#7c3aed';
    ctx.fillRect(player.x + 4, player.y + player.h, 8, 6 + legAnim);
    ctx.fillRect(player.x + player.w - 12, player.y + player.h, 8, 6 - legAnim);
  }

  ctx.shadowBlur = 0;
}

function drawObstacles() {
  obstacles.forEach(ob => {
    ob.pulse += 0.05;
    const glow = Math.sin(ob.pulse) * 3;
    ctx.shadowBlur = 15 + glow;
    ctx.shadowColor = COLORS.obstacleGlow;
    ctx.fillStyle = COLORS.obstacle;
    rr(ctx, ob.x, ob.y, ob.w, ob.h, 4);
    ctx.fill();
    ctx.shadowBlur = 0;
    ctx.strokeStyle = '#fb7185';
    ctx.lineWidth = 1;
    ctx.strokeRect(ob.x + 2, ob.y + 2, ob.w - 4, ob.h - 4);
  });
}

function drawGround() {
  ctx.fillStyle = COLORS.ground;
  ctx.fillRect(0, GR + player.h, W, H - GR - player.h);

  ctx.shadowBlur = 12;
  ctx.shadowColor = COLORS.groundLine;
  ctx.strokeStyle = COLORS.groundLine;
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(0, GR + player.h);
  ctx.lineTo(W, GR + player.h);
  ctx.stroke();
  ctx.shadowBlur = 0;

  const offset = (state.frame * state.speed) % 60;
  ctx.strokeStyle = 'rgba(123,47,190,0.15)';
  ctx.lineWidth = 1;
  for (let x = -offset; x < W; x += 60) {
    ctx.beginPath();
    ctx.moveTo(x, GR + player.h);
    ctx.lineTo(x - 30, H);
    ctx.stroke();
  }
}

function drawStars() {
  stars.forEach(s => {
    s.blink += 0.02;
    const alpha = 0.4 + Math.sin(s.blink) * 0.3;
    ctx.fillStyle = `rgba(226,232,240,${alpha})`;
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    ctx.fill();
  });
}

function drawParticles() {
  particles.forEach(p => {
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.death ? COLORS.obstacle : COLORS.trail;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r * p.life, 0, Math.PI * 2);
    ctx.fill();
  });
  ctx.globalAlpha = 1;
}

function drawSoundButton() {
  ctx.textAlign = 'right';
  ctx.font = `${Math.max(11, W * 0.035)}px 'Courier New'`;
  ctx.fillStyle = state.soundOn ? 'rgba(52,211,153,0.95)' : 'rgba(148,163,184,0.85)';
  ctx.fillText(state.soundOn ? '🔊' : '🔇', W - 10, 28);
  ctx.textAlign = 'center';
}

function drawHUD() {
  ctx.fillStyle = COLORS.score;
  ctx.font = `bold ${W * 0.08}px 'Courier New'`;
  ctx.textAlign = 'center';
  ctx.fillText(Math.floor(state.score), W / 2, H * 0.08);

  ctx.font = `${W * 0.032}px 'Courier New'`;
  ctx.fillStyle = 'rgba(168,85,247,0.75)';
  const td = parseInt(localStorage.getItem('smol_best_' + todayKey()) || '0', 10);
  const wk = parseInt(localStorage.getItem('smol_best_' + weekKey()) || '0', 10);
  ctx.fillText(`СЕГОДНЯ ${td}  ·  НЕДЕЛЯ ${wk}`, W / 2, H * 0.125);

  ctx.font = `${W * 0.04}px 'Courier New'`;
  ctx.fillStyle = 'rgba(168,85,247,0.8)';
  ctx.fillText(`BEST ${state.best}`, W / 2, H * 0.155);

  const gk = 'smol_goal_' + todayKey();
  const goalDone = localStorage.getItem(gk) === '1';
  ctx.font = `${W * 0.03}px 'Courier New'`;
  ctx.fillStyle = goalDone ? 'rgba(52,211,153,0.9)' : 'rgba(250,204,21,0.85)';
  ctx.fillText(goalDone ? `ЦЕЛЬ ${DAILY_GOAL} ✓` : `ЦЕЛЬ ${DAILY_GOAL}`, W / 2, H * 0.185);

  if (state.goalToast > 0) {
    ctx.font = `bold ${W * 0.045}px 'Courier New'`;
    ctx.fillStyle = 'rgba(52,211,153,0.95)';
    ctx.fillText('ЦЕЛЬ ДНЯ!', W / 2, H * 0.26);
  }

  for (let i = 0; i < player.maxJumps; i++) {
    ctx.beginPath();
    ctx.arc(W / 2 - 12 + i * 20, H * 0.2, 5, 0, Math.PI * 2);
    ctx.fillStyle = i < player.jumps ? 'rgba(168,85,247,0.2)' : '#a855f7';
    ctx.fill();
  }

  drawSoundButton();
}

function drawScreen(title, sub) {
  ctx.fillStyle = 'rgba(10,10,15,0.7)';
  ctx.fillRect(0, 0, W, H);

  ctx.textAlign = 'center';
  ctx.shadowBlur = 30;
  ctx.shadowColor = '#7c3aed';
  ctx.fillStyle = '#e2e8f0';
  ctx.font = `bold ${W * 0.13}px 'Courier New'`;
  ctx.fillText(title, W / 2, H * 0.4);
  ctx.shadowBlur = 0;

  ctx.font = `${W * 0.045}px 'Courier New'`;
  ctx.fillStyle = 'rgba(148,163,184,0.9)';
  ctx.fillText('Звук: тап по 🔇 справа сверху', W / 2, H * 0.48);

  ctx.font = `${W * 0.055}px 'Courier New'`;
  ctx.fillStyle = 'rgba(168,85,247,0.9)';
  ctx.fillText(sub, W / 2, H * 0.55);

  if (state.phase === 'dead') {
    ctx.font = `${W * 0.05}px 'Courier New'`;
    ctx.fillStyle = 'rgba(226,232,240,0.6)';
    ctx.fillText(`СЧЁТ ${Math.floor(state.score)}`, W / 2, H * 0.63);
    ctx.fillText(`РЕКОРД ${state.best}`, W / 2, H * 0.69);
  }
}

function tickParticlesAndFlash() {
  particles.forEach(p => {
    p.x += p.vx;
    p.y += p.vy;
    if (!p.death) p.vy += 0.1;
    p.life -= p.decay;
  });
  particles = particles.filter(p => p.life > 0);
  if (state.flash > 0) state.flash--;
  if (state.goalToast > 0) state.goalToast--;
}

function recordDeathScore() {
  if (state.recordedDeath) return;
  state.recordedDeath = true;
  const s = Math.floor(state.score);
  const tk = todayKey();
  const wkk = weekKey();
  if (s > state.best) {
    state.best = s;
    localStorage.setItem('smol_best', String(state.best));
  }
  const bt = parseInt(localStorage.getItem('smol_best_' + tk) || '0', 10);
  if (s > bt) localStorage.setItem('smol_best_' + tk, String(s));
  const bw = parseInt(localStorage.getItem('smol_best_' + wkk) || '0', 10);
  if (s > bw) localStorage.setItem('smol_best_' + wkk, String(s));
}

function update() {
  if (state.phase !== 'play') return;

  if (state.hitstop > 0) {
    state.hitstop--;
    tickParticlesAndFlash();
    return;
  }

  if (player.dead) {
    obstacles.forEach(ob => {
      ob.x -= state.speed;
    });
    obstacles = obstacles.filter(ob => ob.x > -100);
    tickParticlesAndFlash();
    return;
  }

  state.frame++;
  const warmup = state.frame < 200;
  let spdAdd = state.score * 0.012;
  if (warmup) spdAdd *= 0.52;
  state.score += state.speed * 0.05;
  state.speed = 5 + spdAdd;
  if (state.speed > 18) state.speed = 18;

  applyPaletteByScore(state.score);

  if (state.score >= DAILY_GOAL && localStorage.getItem('smol_goal_' + todayKey()) !== '1') {
    localStorage.setItem('smol_goal_' + todayKey(), '1');
    state.goalToast = 90;
    playTone(660, 0.07, 0.05);
    playTone(880, 0.08, 0.04);
  }

  player.trail.unshift({ x: player.x, y: player.y });
  if (player.trail.length > 8) player.trail.pop();

  player.vy += GRAVITY;
  player.y += player.vy;

  if (player.y >= GR) {
    player.y = GR;
    player.vy = 0;
    player.jumps = 0;
  }

  let spawnRate = Math.max(55, 110 - state.speed * 3);
  if (warmup) spawnRate *= 1.42;
  if (state.frame % Math.floor(spawnRate) === 0) {
    spawnObstacleWave();
  }

  obstacles.forEach(ob => {
    ob.x -= state.speed;
  });
  obstacles = obstacles.filter(ob => ob.x > -100);

  obstacles.forEach(ob => {
    if (checkCollision(player, ob) && !player.dead) {
      player.dead = true;
      state.hitstop = 10;
      state.flash = 8;
      spawnDeathParticles();
      recordDeathScore();
      playTone(140, 0.14, 0.07);
      setTimeout(() => {
        state.phase = 'dead';
      }, 650);
    }
  });

  tickParticlesAndFlash();

  if (!dino.active && state.frame >= state.nextDinoAt) {
    spawnDino();
  }
  updateDino();
}

function draw() {
  ctx.fillStyle =
    state.flash > 0
      ? `rgba(244,63,94,${(state.flash / 10) * 0.22})`
      : COLORS.bg;
  ctx.fillRect(0, 0, W, H);

  drawStars();
  drawGround();
  drawParticles();
  drawObstacles();
  if (!player.dead || state.flash > 0) drawPlayer();
  drawChromeDino();
  drawHUD();

  if (state.phase === 'start') {
    drawScreen('SMOL RUN', '▶  НАЖМИ ЧТОБЫ НАЧАТЬ');
  }
  if (state.phase === 'dead') {
    drawScreen('GAME OVER', '▶  ЕЩЁ РАЗ');
  }
}

function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}

function pointerClientPos(e) {
  const r = canvas.getBoundingClientRect();
  const x = (e.clientX - r.left) * (canvas.width / r.width);
  const y = (e.clientY - r.top) * (canvas.height / r.height);
  return { x, y };
}

canvas.addEventListener(
  'touchstart',
  e => {
    e.preventDefault();
    const t = e.changedTouches[0];
    const r = canvas.getBoundingClientRect();
    const x = (t.clientX - r.left) * (canvas.width / r.width);
    const y = (t.clientY - r.top) * (canvas.height / r.height);
    if (toggleSoundTap(x, y)) return;
    jump();
  },
  { passive: false }
);

canvas.addEventListener('mousedown', e => {
  e.preventDefault();
  const { x, y } = pointerClientPos(e);
  if (toggleSoundTap(x, y)) return;
  jump();
});

document.addEventListener('keydown', e => {
  if (e.code === 'Space' || e.code === 'ArrowUp') jump();
});

loop();
</script>
</body>
</html>
